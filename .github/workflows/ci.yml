name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP ${{ matrix.php }} Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPCS
        run: composer run phpcs

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli
          tools: wp-cli

      - name: Install WordPress
        run: |
          mkdir -p /tmp/wp && cd /tmp/wp
          wp core download --allow-root
          wp config create --dbname=wordpress --dbuser=root --dbpass=root --dbhost=127.0.0.1 --allow-root
          wp core install --url=http://localhost --title=Test --admin_user=admin --admin_password=admin --admin_email=test@test.com --skip-email --allow-root

      - name: Install and activate plugins
        run: |
          ln -s $GITHUB_WORKSPACE/plugin /tmp/wp/wp-content/plugins/edge-link-router
          cd /tmp/wp
          wp plugin activate edge-link-router --allow-root
          wp plugin install plugin-check --activate --allow-root

      - name: Run Plugin Check
        run: cd /tmp/wp && wp plugin check edge-link-router --slug=edge-link-router --fields=file,line,column,type,code,message --allow-root

  build:
    name: Build ZIP
    runs-on: ubuntu-latest
    needs: [lint, plugin-check]
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          mkdir -p build/edge-link-router
          cp -r plugin/* build/edge-link-router/
          rm -rf build/edge-link-router/assets/wporg
          cd build
          zip -r ../edge-link-router.zip edge-link-router -x '*.DS_Store' -x '*.git*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-link-router
          path: edge-link-router.zip
          retention-days: 7
